[package]
name = "sampyclaw-desktop"
version = "0.1.0"
description = "sampyClaw native desktop app"
authors = ["sampyClaw"]
license = "MIT"
edition = "2021"
rust-version = "1.77"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-notification = "2"
tauri-plugin-store = "2"
tauri-plugin-autostart = "2"
tauri-plugin-shell = "2"
tauri-plugin-os = "2"
keyring = "3"                      # Windows Credential Manager
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
log = "0.4"
env_logger = "0.11"

[features]
# `custom-protocol` is the Tauri-required feature for production builds.
custom-protocol = ["tauri/custom-protocol"]
