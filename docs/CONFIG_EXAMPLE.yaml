# Example oxenclaw config. Copy to ~/.oxenclaw/config.yaml.
#
# Chat surface: the bundled `dashboard` channel (web SPA + native desktop
# clients on Windows/Ubuntu) is registered automatically and needs no config.
#
# Slack is outbound-only — used for special-case alerts. Credentials live in
# a sibling directory and are never stored in this file:
#   ~/.oxenclaw/credentials/slack/<account_id>.json  →  {"token": "xoxb-..."}
#
# Single-workspace shortcut: leave the `main` account and export
# SLACK_BOT_TOKEN in your shell instead of writing credentials/slack/main.json.

channels:
  # Outbound-only Slack. Remove this block if you don't need Slack alerts.
  slack:
    accounts:
      - account_id: main
        display_name: "Workspace Alerts"

agents:
  # Default provider is `local` — a self-hosted OpenAI-compatible server
  # (Ollama at http://127.0.0.1:11434/v1 by default). Override base_url /
  # api_key / model on the CLI or via `agents.create` RPC.
  assistant:
    id: assistant
    provider: local
    model: qwen3.5:9b
    channels:
      dashboard:
        allow_from: []
  echo:
    id: echo
    provider: echo
    channels:
      dashboard:
        allow_from: []

# ClawHub registries — list every "verified" mirror you want skills installed
# from. The `default` registry is used when an RPC/CLI omits an explicit
# `--registry`/`registry=` argument. Tokens come from env vars (preferred)
# or, less safely, inline `token:` strings (which would land in version
# control, so don't).
#
# Trust levels:
#   official  — public clawhub.ai
#   mirror    — operator-controlled internal mirror, equally trusted
#   community — third-party hub; lower trust, surfaced in the dashboard
#
# Removing the public registry from this list is the way to lock the
# install down to your private mirror only.
clawhub:
  default: corp-mirror
  registries:
    - name: corp-mirror
      url: https://clawhub.corp.example.com
      token_env: CORP_CLAWHUB_TOKEN
      trust: mirror
    - name: public
      url: https://clawhub.ai
      trust: official

# Optional toolsets — both are gated by env vars rather than this file
# so operators can flip them per shell without touching disk. Listed
# here for visibility.
#
# Browser tools (BR-1, headless Playwright):
#   OXENCLAW_ENABLE_BROWSER=1
#   OXENCLAW_NET_ALLOW_HOSTS=example.com,*.docs.io
#   pip install 'oxenclaw[browser]' && playwright install chromium
#   See docs/BROWSER.md
#
# Canvas tools (CV-1, dashboard-embedded HTML rendering):
#   OXENCLAW_ENABLE_CANVAS=1
#   (No extras required; the dashboard panel + RPCs are always wired.)
#   See docs/CANVAS.md
#
# Outbound HTTP audit (across web tool, browser tool, MCP HTTP):
#   OXENCLAW_AUDIT_OUTBOUND=1   # writes ~/.oxenclaw/outbound-audit.db
#   OXENCLAW_AUDIT_OUTBOUND_BODY=1
#   OXENCLAW_AUDIT_OUTBOUND_SAMPLE=0.5
