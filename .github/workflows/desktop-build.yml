name: desktop-build

# PR-only validation build for the Tauri desktop app. Catches Cargo /
# Tauri-config breakage before merge, but does NOT publish anything —
# the full release pipeline (Python wheel + .msi + GitHub Release +
# PyPI) lives in `.github/workflows/release.yml` and triggers on
# `v*` tags.

on:
  pull_request:
    paths:
      - "desktop/**"
      - "oxenclaw/static/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.toml', 'desktop/src-tauri/tauri.conf.json') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Locate or install WiX toolset (required for .msi)
        # `windows-latest` ships WiX 3.x preinstalled; reuse it if we
        # find candle.exe, only falling back to a fresh `choco install`
        # when nothing is detected. See release.yml for the full rationale.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $wixBin = $null
          $candle = (Get-Command candle.exe -ErrorAction SilentlyContinue)
          if ($candle) {
            $wixBin = Split-Path $candle.Source -Parent
          }
          if (-not $wixBin) {
            $candidates = @(
              "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
              "$env:ProgramFiles\WiX Toolset v3.14\bin",
              "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin",
              "$env:ProgramFiles\WiX Toolset v3.11\bin",
              "$env:ProgramData\chocolatey\lib\wixtoolset\tools"
            )
            foreach ($c in $candidates) {
              if (Test-Path "$c\candle.exe") { $wixBin = $c; break }
            }
          }
          if (-not $wixBin) {
            choco install -y wixtoolset
            foreach ($c in @(
              "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
              "$env:ProgramFiles\WiX Toolset v3.14\bin",
              "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin",
              "$env:ProgramFiles\WiX Toolset v3.11\bin"
            )) {
              if (Test-Path "$c\candle.exe") { $wixBin = $c; break }
            }
          }
          if (-not $wixBin -or -not (Test-Path "$wixBin\candle.exe")) {
            Write-Error "WiX install did not produce candle.exe in any known location"
            exit 1
          }
          echo $wixBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          echo "WIX=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build .msi + NSIS .exe
        working-directory: desktop
        run: cargo tauri build --bundles msi nsis

      - name: Verify .msi was produced
        shell: bash
        run: |
          shopt -s nullglob
          msi_files=( desktop/src-tauri/target/release/bundle/msi/*.msi )
          if [ ${#msi_files[@]} -eq 0 ]; then
            echo "::error::No .msi produced — WiX install or tauri-bundler msi step failed"
            ls -la desktop/src-tauri/target/release/bundle/ || true
            exit 1
          fi
          echo "MSI built: ${msi_files[*]}"

      - name: Upload preview artifacts
        # PR previews retained for 7 days; full release artifacts
        # come from release.yml on tag push.
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.number }}-desktop-preview
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
