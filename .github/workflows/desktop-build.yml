name: desktop-build

# PR-only validation build for the Tauri desktop app. Catches Cargo /
# Tauri-config breakage before merge, but does NOT publish anything —
# the full release pipeline (Python wheel + .msi + GitHub Release +
# PyPI) lives in `.github/workflows/release.yml` and triggers on
# `v*` tags.

on:
  pull_request:
    paths:
      - "desktop/**"
      - "sampyclaw/static/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build .msi
        working-directory: desktop
        run: cargo tauri build

      - name: Upload preview artifacts
        # PR previews retained for 7 days; full release artifacts
        # come from release.yml on tag push.
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.number }}-desktop-preview
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
